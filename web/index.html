<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArduinoMaze</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/main.js"></script>
</head>
<body>
    <header>Hellooo this is our game</header>
    <section class="game">
        <div class="wrapper">
            <div class="connection">
                <h2 class="title">Connection</h2>
                <form action="" id="connection-information-form" class="connectionForm">
                    <p>Hostname or IP Address and Port Number:</p> 
                    <input id="host" type="text" name="host" placeholder="broker host">
                    
                    <input id="port" type="text" name="port" value="8080">
                    <p>Username and Password:</p>
                    <input id="username" type="text" name="Username" placeholder="Username">
                    
                    <input id="password" type="password" name="password" placeholder="password">
                    <p>Subscription topic:</p>
                    <input id="topic_s" type="text" name="topic_s" value="#">
                    <input type="button" onclick="startConnect()"  value="Connect">
                    <input type="button"  onclick="startDisconnect()" value="Disconnect">
                    <p>Publish Topic and Message:</p>
                    <input id="topic_p" type="text" name="topic_p" placeholder="Publish topic">
                    
                    <input id="Message" type="text" name="message"  placehilder="Message">
                    <input type="button" onclick="publishMessage()" value="Publish">
                </form>
            </div>
            <div class="maze">
                <div class="maze_screen"></div>
                <div class="maze_controls"></div>
            </div>     
        </div>
    </section>

</body>
</html>
